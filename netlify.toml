# Netlify build + deploy configuration.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Leave VITE_API_BASE_URL UNSET here so the deployed site runs against the
  # bundled mock fixtures by default. Set it in Netlify's Site Settings →
  # Environment Variables when the real backend ships.

# SPA fallback — hash routing means deep links like /#/result already work,
# but in case the future router ever switches to history mode this catches
# every path and serves index.html with a 200.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets (Vite emits `assets/*.[hash].js|css`).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
